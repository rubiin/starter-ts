name: CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v3
        with:
          version: 11.3.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: pnpm

      - run: pnpm install --shamefully-hoist
      - run: pnpm lint
      - run: pnpm build
